  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;xag-log-analyzer&quot; class=&quot;xag-log-analyzer&quot;&gt;
  &lt;style&gt;
    #xag-log-analyzer {
      --surface: color-mix(in srgb, var(--card, #f8f8f8) 82%, transparent);
      --soft: color-mix(in srgb, var(--muted, #e8e8e8) 62%, transparent);
      --soft-strong: color-mix(in srgb, var(--muted, #e8e8e8) 86%, transparent);
      --line: var(--border, #d8d8d8);
      --text: var(--foreground, #1f1f1f);
      --subtle: var(--muted-foreground, #666);
      --primary-color: var(--primary, #2563eb);
      --danger: var(--destructive, #b42318);
      --ok: var(--viz-series-2, #198754);
      color: var(--text);
      display: grid;
      gap: 12px;
      font-family: inherit;
    }

    #xag-log-analyzer * {
      box-sizing: border-box;
    }

    #xag-log-analyzer .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    #xag-log-analyzer .top-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
      gap: 12px;
      align-items: stretch;
    }

    #xag-log-analyzer .controls,
    #xag-log-analyzer .filter-row,
    #xag-log-analyzer .chip-row,
    #xag-log-analyzer .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    #xag-log-analyzer textarea,
    #xag-log-analyzer input,
    #xag-log-analyzer select,
    #xag-log-analyzer button {
      font: inherit;
    }

    #xag-log-analyzer textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      color: var(--text);
      background: var(--background, #fff);
      border: 1px solid var(--input, var(--line));
      border-radius: 8px;
      padding: 10px;
      white-space: pre;
      overflow: auto;
    }

    #xag-log-analyzer input,
    #xag-log-analyzer select {
      color: var(--text);
      background: var(--background, #fff);
      border: 1px solid var(--input, var(--line));
      border-radius: 8px;
      padding: 8px 10px;
      min-height: 36px;
    }

    #xag-log-analyzer input[type=&quot;number&quot;] {
      width: 88px;
    }

    #xag-log-analyzer input[type=&quot;search&quot;] {
      flex: 1 1 220px;
      min-width: 0;
    }

    #xag-log-analyzer button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      color: var(--text);
      padding: 8px 10px;
      cursor: pointer;
    }

    #xag-log-analyzer button.primary {
      background: var(--primary-color);
      border-color: var(--primary-color);
      color: var(--primary-foreground, #fff);
    }

    #xag-log-analyzer button.is-active {
      outline: 2px solid var(--ring, var(--primary-color));
      outline-offset: 1px;
    }

    #xag-log-analyzer .file-input {
      flex: 1 1 220px;
      min-width: 0;
    }

    #xag-log-analyzer .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    #xag-log-analyzer .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      padding: 10px;
      min-width: 0;
    }

    #xag-log-analyzer .metric span,
    #xag-log-analyzer .section-label,
    #xag-log-analyzer .hint,
    #xag-log-analyzer .small {
      color: var(--subtle);
    }

    #xag-log-analyzer .metric strong {
      display: block;
      font-weight: 500;
      overflow-wrap: anywhere;
    }

    #xag-log-analyzer .section-label {
      font-weight: 500;
      margin: 0 0 8px;
    }

    #xag-log-analyzer .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
      margin-bottom: 10px;
    }

    #xag-log-analyzer .tabs button {
      border-radius: 8px;
    }

    #xag-log-analyzer .view {
      display: none;
    }

    #xag-log-analyzer .view.is-active {
      display: grid;
      gap: 10px;
    }

    #xag-log-analyzer .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    #xag-log-analyzer table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    #xag-log-analyzer th,
    #xag-log-analyzer td {
      text-align: left;
      vertical-align: top;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      font-weight: 400;
    }

    #xag-log-analyzer th {
      color: var(--subtle);
      background: var(--soft);
      font-weight: 500;
    }

    #xag-log-analyzer tr:last-child td {

    }

    #xag-log-analyzer .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    #xag-log-analyzer .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--text);
      padding: 3px 8px;
      min-height: 26px;
      font-size: calc(var(--font-size-base, 14px) * 0.9);
    }

    #xag-log-analyzer .badge.danger {
      color: var(--danger);
      border-color: color-mix(in srgb, var(--danger) 42%, var(--line));
      background: color-mix(in srgb, var(--danger) 12%, transparent);
    }

    #xag-log-analyzer .badge.ok {
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 38%, var(--line));
      background: color-mix(in srgb, var(--ok) 12%, transparent);
    }

    #xag-log-analyzer .timeline {
      display: grid;
      gap: 6px;
    }

    #xag-log-analyzer .bucket {
      display: grid;
      grid-template-columns: 96px 1fr 72px;
      gap: 8px;
      align-items: center;
    }

    #xag-log-analyzer .bar {
      height: 12px;
      background: var(--soft-strong);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    #xag-log-analyzer .bar &gt; span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--primary-color);
    }

    #xag-log-analyzer .line-list {
      display: grid;
      gap: 6px;
      max-height: 540px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--background, #fff);
      padding: 8px;
    }

    #xag-log-analyzer .log-line {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 8px;
      padding: 6px;
      border-radius: 6px;
      background: transparent;
    }

    #xag-log-analyzer .log-line:nth-child(odd) {
      background: var(--soft);
    }

    #xag-log-analyzer mark {
      color: inherit;
      background: color-mix(in srgb, var(--primary-color) 24%, transparent);
      border-radius: 4px;
      padding: 0 2px;
    }

    #xag-log-analyzer .empty {
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--subtle);
    }

    @media (max-width: 760px) {
      #xag-log-analyzer .top-grid,
      #xag-log-analyzer .metric-grid {
        grid-template-columns: 1fr;
      }

      #xag-log-analyzer .bucket,
      #xag-log-analyzer .log-line {
        grid-template-columns: 1fr;
      }
    }
  &lt;/style&gt;

  &lt;div class=&quot;top-grid&quot;&gt;

        &lt;div class=&quot;metric&quot;&gt;&lt;span&gt;总行数&lt;/span&gt;&lt;strong&gt;0&lt;/strong&gt;&lt;/div&gt;

  &lt;section class=&quot;panel&quot;&gt;
    &lt;div class=&quot;tabs&quot; role=&quot;tablist&quot; aria-label=&quot;analysis views&quot;&gt;
      &lt;button class=&quot;is-active&quot; data-view=&quot;issues&quot; type=&quot;button&quot;&gt;问题&lt;/button&gt;
      &lt;button data-view=&quot;commands&quot; type=&quot;button&quot;&gt;指令&lt;/button&gt;
      &lt;button data-view=&quot;timeline&quot; type=&quot;button&quot;&gt;时间线&lt;/button&gt;

    &lt;div id=&quot;xag-view-issues&quot; class=&quot;view is-active&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;xag-view-commands&quot; class=&quot;view&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;xag-view-timeline&quot; class=&quot;view&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;xag-view-modules&quot; class=&quot;view&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;xag-view-lines&quot; class=&quot;view&quot;&gt;&lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;xag-log-analyzer&#x27;);
      const $ = (id) =&gt; root.querySelector(id);
      const logText = $(&#x27;#xag-log-text&#x27;);
      const fileInput = $(&#x27;#xag-log-file&#x27;);
      const queryInput = $(&#x27;#xag-query&#x27;);
      const contextInput = $(&#x27;#xag-context&#x27;);
      const regexInput = $(&#x27;#xag-regex&#x27;);
      const caseInput = $(&#x27;#xag-case&#x27;);
      const views = {
        issues: $(&#x27;#xag-view-issues&#x27;),
        commands: $(&#x27;#xag-view-commands&#x27;),
        timeline: $(&#x27;#xag-view-timeline&#x27;),
        modules: $(&#x27;#xag-view-modules&#x27;),
        lines: $(&#x27;#xag-view-lines&#x27;)
      };

      const issueRules = [
        { id: &#x27;decode_missing&#x27;, label: &#x27;日志缺段&#x27;, severity: &#x27;high&#x27;, re: /log seq:.*missing|is missing/i, hint: &#x27;日志文件本身不连续，分析前后链路时要留意缺口。&#x27; },
        { id: &#x27;xbus_level6&#x27;, label: &#x27;XBUS 高等级错误&#x27;, severity: &#x27;high&#x27;, re: /BASE_DeviceSDK_XBUS.*level:6|iot return error code/i, hint: &#x27;通信层返回错误，常见于链路或 RPC 连接不可用。&#x27; },
        { id: &#x27;send_bad&#x27;, label: &#x27;指令返回异常&#x27;, severity: &#x27;high&#x27;, custom: isBadSend, hint: &#x27;from_topic 指令发送结果不是成功值。&#x27; },
        { id: &#x27;sync_false&#x27;, label: &#x27;同步失败&#x27;, severity: &#x27;medium&#x27;, re: /BASE_SyncToDevice.*result:false|同步.*失败/i, hint: &#x27;配置、围栏、文件或区域数据同步未成功。&#x27; },
        { id: &#x27;device_offline&#x27;, label: &#x27;设备离线/无状态&#x27;, severity: &#x27;medium&#x27;, re: /not online|设备不在线|hasStatusData = false|cellularConnect=false, wifiConnect=false|wifiStrength=OFFLINE|bleStrength=OFFLINE/i, hint: &#x27;设备或链路状态不可用，可能导致同步和指令失败。&#x27; },
        { id: &#x27;event_problem&#x27;, label: &#x27;告警/错误事件&#x27;, severity: &#x27;medium&#x27;, re: /ThingEvent\(.*type=&#x27;(?:error|alarm)&#x27;/i, hint: &#x27;设备事件中出现 error 或 alarm。&#x27; },
        { id: &#x27;event_config_null&#x27;, label: &#x27;事件配置缺失&#x27;, severity: &#x27;low&#x27;, re: /eventConfig is null/i, hint: &#x27;事件 ID 没有匹配到配置，可能影响展示或解释。&#x27; },
        { id: &#x27;exception&#x27;, label: &#x27;异常堆栈/空指针&#x27;, severity: &#x27;high&#x27;, re: /Exception|NullPointerException|FATAL|Crash|ANR/i, hint: &#x27;App 运行异常，需要优先看上下文。&#x27; },
        { id: &#x27;coverage_gap&#x27;, label: &#x27;轨迹补点/重复点&#x27;, severity: &#x27;low&#x27;, re: /Duplicate point|Querying missing points|\[Independent Fallback\]|fallback check/i, hint: &#x27;作业轨迹保存中出现重复、补点或兜底逻辑。&#x27; }
      ];

      const state = {
        rawLines: [],
        entries: [],
        analysis: null,
        filtered: [],
        lastQuery: &#x27;&#x27;
      };

      function parseLine(text, index) {
        const lineNumber = index + 1;
        const match = text.match(/^\[.*?\]\s+(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2}:\d{2}\.\d{3})\s+(\d+)\s+(\S+)\s+(\S)\s+(.*)$/);
        if (!match) {
          return { index: lineNumber, raw: text, time: &#x27;&#x27;, pid: &#x27;&#x27;, tag: &#x27;&#x27;, level: &#x27;&#x27;, msg: text };
        }
        return {
          index: lineNumber,
          raw: text,
          time: `${match[1]} ${match[2]}`,
          pid: match[3],
          tag: match[4],
          level: match[5],
          msg: match[6]
        };
      }

      function inc(map, key, amount = 1) {
        if (!key) return;
        map.set(key, (map.get(key) || 0) + amount);
      }

      function top(map, limit = 12) {
        return Array.from(map.entries()).sort((a, b) =&gt; b[1] - a[1]).slice(0, limit);
      }

      function isBadSend(entry) {
        const match = entry.raw.match(/msg:send msg:.*?result\s*=\s*(-?\d+)/i);
        return Boolean(match &amp;&amp; match[1] !== &#x27;1&#x27;);
      }

      function getTopic(entry) {
        const match = entry.raw.match(/from_topic\s*=\s*([^,\s]+)/i) || entry.raw.match(/topic\s*=\s*([^,\s]+)/i) || entry.raw.match(/topic:([^,\s$]+)/i);
        return match ? match[1] : &#x27;&#x27;;
      }

      function getDevice(entry) {
        const match = entry.raw.match(/device_id\s*=\s*([^,\s]+)/i) || entry.raw.match(/devId\s*=\s*([^,\s;\)]+)/i) || entry.raw.match(/deviceId=&#x27;([^&#x27;]+)&#x27;/i);
        return match ? match[1] : &#x27;&#x27;;
      }

      function getResult(entry) {
        const match = entry.raw.match(/result\s*=\s*(-?\d+)/i) || entry.raw.match(/result:(true|false)/i);
        return match ? match[1] : &#x27;&#x27;;
      }

      function getCorrelationIds(entry) {
        const ids = [];
        const patterns = [/qosid:(\d+)/ig, /busid:(\d+)/ig, /qos:(\d+)/ig];
        patterns.forEach((pattern) =&gt; {
          let match = pattern.exec(entry.raw);
          while (match) {
            ids.push(match[1]);
            match = pattern.exec(entry.raw);
          }
        });
        return Array.from(new Set(ids)).filter((id) =&gt; id !== &#x27;0&#x27; &amp;&amp; id.length &gt; 5);
      }

      function classify(entries) {
        const tags = new Map();
        const levels = new Map();
        const pids = new Map();
        const topics = new Map();
        const badTopics = new Map();
        const devices = new Map();
        const events = new Map();
        const syncs = new Map();
        const buckets = new Map();
        const issues = issueRules.map((rule) =&gt; ({ ...rule, count: 0, first: null, last: null, sample: null, lines: [] }));
        let firstTime = &#x27;&#x27;;
        let lastTime = &#x27;&#x27;;
        let parsed = 0;

        entries.forEach((entry) =&gt; {
          if (entry.time) {
            parsed += 1;
            if (!firstTime) firstTime = entry.time;
            lastTime = entry.time;
            inc(buckets, entry.time.slice(11, 16));
          }
          inc(tags, entry.tag || &#x27;未解析&#x27;);
          inc(levels, entry.level || &#x27;未解析&#x27;);
          inc(pids, entry.pid || &#x27;未解析&#x27;);

          const topic = getTopic(entry);
          if (topic) inc(topics, topic);
          const device = getDevice(entry);
          if (device) inc(devices, device);
          const result = getResult(entry);
          if (topic &amp;&amp; result &amp;&amp; result !== &#x27;1&#x27; &amp;&amp; result !== &#x27;true&#x27;) inc(badTopics, `${topic}  result=${result}`);

          const eventMatch = entry.raw.match(/ThingEvent\(id=&#x27;([^&#x27;]+)&#x27;, type=&#x27;([^&#x27;]+)&#x27;/i);
          if (eventMatch) inc(events, `${eventMatch[1]}  ${eventMatch[2]}`);

          const syncMatch = entry.raw.match(/【([^】]+)】sync to device:([^,]+),result:(true|false)/i);
          if (syncMatch) inc(syncs, `${syncMatch[1]} -&gt; ${syncMatch[2]}  ${syncMatch[3]}`);

          issues.forEach((issue) =&gt; {
            const hit = issue.custom ? issue.custom(entry) : issue.re.test(entry.raw);
            if (!hit) return;
            issue.count += 1;
            issue.first = issue.first || entry.time || `line ${entry.index}`;
            issue.last = entry.time || `line ${entry.index}`;
            issue.sample = issue.sample || entry.raw;
            if (issue.lines.length &lt; 300) issue.lines.push(entry.index);
          });
        });

        const issueTotal = issues.reduce((sum, item) =&gt; sum + item.count, 0);
        return { tags, levels, pids, topics, badTopics, devices, events, syncs, buckets, issues, issueTotal, firstTime, lastTime, parsed };
      }

      function analyze() {
        const text = logText.value || &#x27;&#x27;;
        state.rawLines = text ? text.split(/\r?\n/) : [];
        if (state.rawLines.length &amp;&amp; state.rawLines[state.rawLines.length - 1] === &#x27;&#x27;) state.rawLines.pop();
        state.entries = state.rawLines.map(parseLine);
        state.analysis = classify(state.entries);
        renderAll();

      function renderAll() {
        renderMetrics();

        renderIssues();
        renderCommands();

        renderModules();
        filterLines();

      function renderMetrics() {
        const a = state.analysis;
        const primaryTag = a ? top(a.tags, 1)[0] : null;
        const range = a &amp;&amp; a.firstTime ? `${a.firstTime.slice(11)} - ${a.lastTime.slice(11)}` : &#x27;-&#x27;;

          metric(&#x27;时间范围&#x27;, range),
          metric(&#x27;主要模块&#x27;, primaryTag ? `${primaryTag[0]} (${primaryTag[1].toLocaleString()})` : &#x27;-&#x27;)
        ].join(&#x27;&#x27;);
      }

      function metric(label, value) {

      function renderQuickChips() {

      function renderIssues() {

      function renderCommands() {

        const levelRows = top(a.levels, 10).map(([name, count]) =&gt; commandRow(name, count, ` ${name} `)).join(&#x27;&#x27;);

        views.modules.innerHTML = `&lt;div class=&quot;table-wrap&quot;&gt;&lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;对象&lt;/th&gt;&lt;th&gt;次数&lt;/th&gt;&lt;th&gt;类型&lt;/th&gt;&lt;th&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;

      function filterLines() {
        const query = queryInput.value.trim();
        state.lastQuery = query;
        const context = Math.max(0, Math.min(20, Number(contextInput.value) || 0));
        if (!state.rawLines.length) {
          views.lines.innerHTML = `&lt;div class=&quot;empty&quot;&gt;等待日志&lt;/div&gt;`;
          state.filtered = [];
          return;
        }
        if (!query) {
          const issueIndexes = new Set();
          state.analysis.issues.forEach((issue) =&gt; issue.lines.forEach((lineNo) =&gt; issueIndexes.add(lineNo - 1)));
          state.filtered = Array.from(issueIndexes).sort((a, b) =&gt; a - b).slice(0, 600).map((idx) =&gt; state.entries[idx]);
          renderLines(&#x27;默认问题线索&#x27;, &#x27;&#x27;);
          return;
        }
        let matcher;
        try {
          if (regexInput.checked) {
            matcher = new RegExp(query, caseInput.checked ? &#x27;&#x27; : &#x27;i&#x27;);
          } else {
            const needle = caseInput.checked ? query : query.toLowerCase();
            matcher = { test: (value) =&gt; (caseInput.checked ? value : value.toLowerCase()).includes(needle) };
          }
        } catch (err) {
          views.lines.innerHTML = `&lt;div class=&quot;empty&quot;&gt;正则不可用：${escapeHtml(err.message)}&lt;/div&gt;`;
          state.filtered = [];
          return;
        }
        const hits = [];
        state.entries.forEach((entry, idx) =&gt; {
          if (matcher.test(entry.raw)) hits.push(idx);
        });
        const expanded = new Set();
        const correlationIds = new Set();
        hits.forEach((idx) =&gt; {
          for (let i = Math.max(0, idx - context); i &lt;= Math.min(state.entries.length - 1, idx + context); i += 1) expanded.add(i);
          if (correlationIds.size &lt; 20) getCorrelationIds(state.entries[idx]).forEach((id) =&gt; correlationIds.add(id));
        });
        if (correlationIds.size &gt; 0) {
          state.entries.forEach((entry, otherIdx) =&gt; {
            for (const id of correlationIds) {
              if (entry.raw.includes(id)) {
                expanded.add(otherIdx);

            }

        state.filtered = Array.from(expanded).sort((a, b) =&gt; a - b).slice(0, 1200).map((idx) =&gt; state.entries[idx]);
        renderLines(`${hits.length.toLocaleString()} 个命中，展示 ${state.filtered.length.toLocaleString()} 行`, query);
      }

      function renderLines(title, query) {
        const safeQuery = query &amp;&amp; !regexInput.checked ? query : &#x27;&#x27;;
        const lines = state.filtered.map((entry) =&gt; `&lt;div class=&quot;log-line&quot;&gt;
          &lt;span class=&quot;mono small&quot;&gt;#${entry.index}&lt;/span&gt;

        &lt;/div&gt;`).join(&#x27;&#x27;);
        views.lines.innerHTML = `&lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;badge&quot;&gt;${escapeHtml(title)}&lt;/span&gt;&lt;span class=&quot;hint&quot;&gt;最多显示 1200 行&lt;/span&gt;&lt;/div&gt;

      function sumMap(map) {

      function escapeRegExp(value) {

      function escapeHtml(value) {

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;

&lt;script&gt;
(() =&gt; {

    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
