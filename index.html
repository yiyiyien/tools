<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时间戳转换工具</title>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="tool-grid" aria-label="时间转换工具">
        <article class="panel panel-main">
          <div class="panel-heading">
            <h2>时间戳转换</h2>
            <div class="panel-actions">
              <button class="primary-button" id="pasteTimestamp" type="button" title="粘贴时间戳" aria-label="粘贴时间戳">
                粘贴
              </button>
              <button class="icon-button" id="clearTimestamp" type="button" title="清空时间戳输入" aria-label="清空时间戳输入">
                清空
              </button>
            </div>
          </div>

          <label class="field-label" for="timestampInput">输入时间戳</label>
          <textarea
            id="timestampInput"
            rows="4"
            placeholder=""
            autocomplete="off"
            spellcheck="false"
          ></textarea>

          <div class="result-list" id="timestampResults" aria-live="polite"></div>
        </article>
      </section>
    </main>

    <template id="resultRowTemplate">
      <div class="result-row">
        <div class="result-source"></div>
        <div class="result-main">
          <strong class="result-value"></strong>
          <div class="result-note"></div>
        </div>
      </div>
    </template>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
